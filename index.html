<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="description" content="Stack It! — free mobile stacking game by FunMindo. Coming soon to Android."/>
<title>Stack It! · FunMindo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & VARS ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #0b0f1e;
  --surface:   #111827;
  --card:      #161d30;
  --border:    rgba(99,120,200,0.18);
  --accent:    #5b7cf7;
  --accent2:   #8fa8ff;
  --text:      #dce4ff;
  --muted:     #7a8ab0;
  --gold:      #f5c842;
  --radius:    14px;
}

html { scroll-behavior: smooth; font-size: 16px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  line-height: 1.75;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Background Grid Pattern */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(91,124,247,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(91,124,247,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

img { display: block; max-width: 100%; height: auto; }
a { text-decoration: none; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: rgba(91,124,247,0.3); border-radius: 3px; }

/* ── LAYOUT WRAPPERS ── */
.wrapper {
  position: relative; z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 80px 24px;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 70px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 40px;
  background: rgba(11, 15, 30, 0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  transition: height 0.3s;
}
nav.s { height: 60px; }
.n-logo img { height: 38px; width: auto; object-fit: contain; }
.n-links { display: flex; gap: 32px; list-style: none; align-items: center; }
.n-links a { 
  font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; 
  letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); 
  transition: color 0.2s; 
}
.n-links a:hover, .n-links a.active { color: var(--text); }
.n-cta {
  padding: 8px 20px;
  background: rgba(91,124,247,0.1);
  border: 1px solid var(--accent);
  border-radius: 8px;
  color: var(--accent2) !important;
  transition: all 0.2s ease !important;
}
.n-cta:hover { background: var(--accent); color: #fff !important; box-shadow: 0 4px 14px rgba(91,124,247,0.3); }

/* Hamburger Menu */
.hbg { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 6px; }
.hbg span { display: block; width: 24px; height: 2px; background: var(--text); border-radius: 2px; transition: 0.3s; }
.hbg.o span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hbg.o span:nth-child(2) { opacity: 0; }
.hbg.o span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* Mobile Menu */
.mob {
  display: none; position: fixed; top: 70px; left: 0; right: 0; z-index: 99;
  background: rgba(11, 15, 30, 0.98); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  flex-direction: column; padding: 20px 28px 30px; gap: 8px;
}
.mob.o { display: flex; }
.mob a {
  font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700;
  letter-spacing: 0.05em; text-transform: uppercase; color: var(--text);
  padding: 12px 0; border-bottom: 1px solid rgba(99,120,200,0.1); transition: color 0.2s;
}
.mob a:last-child { border: none; color: var(--accent2); margin-top: 8px; }

/* ── UI COMPONENTS ── */
.studio-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(91,124,247,0.12);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 6px 16px;
  font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--accent2); margin-bottom: 20px;
}
.studio-badge::before { content: '🎮'; font-size: 14px; }

.section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 32px;
  transition: border-color 0.2s;
  height: 100%;
}
.section:hover { border-color: rgba(91,124,247,0.35); }

.tag {
  display: inline-block; background: rgba(91,124,247,0.15);
  color: var(--accent2); border-radius: 6px; padding: 4px 10px;
  font-size: 12px; font-weight: 600; white-space: nowrap;
}

/* ── HERO ── */
#home {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding-top: 120px; padding-bottom: 60px;
}
.h-inner {
  display: grid; grid-template-columns: 1fr auto; gap: 64px; align-items: center; width: 100%;
}
h1 {
  font-family: 'Syne', sans-serif; font-size: clamp(40px, 6vw, 72px);
  font-weight: 800; color: #fff; letter-spacing: -0.02em; line-height: 1.1; margin-bottom: 16px;
}
h1 span {
  background: linear-gradient(120deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.h-sub {
  font-size: 17px; color: var(--muted); line-height: 1.7;
  max-width: 480px; margin-bottom: 32px;
}
.h-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 36px; }

.h-btns { display: flex; gap: 16px; flex-wrap: wrap; }
.btn-p {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 28px; background: var(--accent); color: #fff;
  font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
  letter-spacing: 0.05em; text-transform: uppercase; border-radius: 8px;
  transition: box-shadow 0.25s, transform 0.2s, background 0.2s;
}
.btn-p:hover { background: #4a68db; box-shadow: 0 6px 20px rgba(91,124,247,0.3); transform: translateY(-2px); }
.btn-s {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 28px; border: 1px solid var(--border); background: var(--surface);
  font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
  letter-spacing: 0.05em; text-transform: uppercase; color: var(--text); border-radius: 8px;
  transition: border-color 0.25s, color 0.25s;
}
.btn-s:hover { border-color: var(--accent); color: var(--accent2); }

.h-right { display: flex; flex-direction: column; align-items: center; gap: 20px; }
.icon-wrap {
  width: 280px; height: 280px; border-radius: 28px; overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: 0 24px 60px rgba(0,0,0,0.4), 0 0 40px rgba(91,124,247,0.15);
}
.icon-wrap img { width: 100%; height: 100%; object-fit: cover; }
.store-badge {
  display: flex; align-items: center; gap: 12px; padding: 12px 20px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; width: 100%; max-width: 240px; transition: border-color 0.2s;
}
.store-badge:hover { border-color: var(--accent); }
.sb-ico { font-size: 24px; }
.sb-top { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.sb-name { font-size: 16px; font-weight: 700; color: #fff; line-height: 1.2; font-family: 'Syne', sans-serif; margin-bottom: 2px;}
.sb-status { font-size: 11px; font-weight: 600; color: #f5c842; }

/* ── GAME & SUPPORT GLOBALS ── */
.sec-header-block { text-align: left; margin-bottom: 48px; max-width: 600px; }
.sec-title {
  font-family: 'Syne', sans-serif; font-size: clamp(28px, 4vw, 40px);
  font-weight: 800; color: #fff; letter-spacing: -0.01em; margin-bottom: 16px;
}
.sec-lead { font-size: 16px; color: var(--muted); line-height: 1.7; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }

/* ── LIST STYLES (inside sections) ── */
.card-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 24px; }
.feature-list { list-style: none; display: flex; flex-direction: column; gap: 16px; }
.feature-list li {
  display: flex; align-items: flex-start; gap: 14px;
  padding-bottom: 16px; border-bottom: 1px solid rgba(99,120,200,0.08);
}
.feature-list li:last-child { border-bottom: none; padding-bottom: 0; }
.f-icon {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--accent), #3a5bd4);
  color: #fff; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px;
}
.f-icon.emoji { background: rgba(91,124,247,0.1); font-size: 18px; }
.f-text h3 { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.f-text p { font-size: 14px; color: var(--muted); line-height: 1.6; margin: 0; }

/* ── SUPPORT SPECIFICS ── */
.contact-card {
  background: linear-gradient(135deg, rgba(91,124,247,0.12), rgba(91,124,247,0.04));
  border: 1px solid rgba(91,124,247,0.3);
  border-radius: var(--radius); padding: 24px; margin-bottom: 24px;
  display: flex; align-items: flex-start; gap: 16px;
}
.contact-card .contact-icon { font-size: 28px; flex-shrink: 0; }
.contact-card h3 { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 6px; }
.contact-card p { font-size: 14px; color: var(--muted); margin-bottom: 8px; }
.contact-card a { color: var(--accent2); font-weight: 500; }

.legal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.legal-card {
  display: flex; flex-direction: column; padding: 20px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; transition: transform 0.2s, border-color 0.2s;
}
.legal-card:hover { transform: translateY(-3px); border-color: var(--accent); }
.lc-icon { font-size: 20px; margin-bottom: 12px; }
.lc-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 6px; }
.lc-desc { font-size: 13px; color: var(--muted); line-height: 1.5; flex-grow: 1; margin-bottom: 14px; }
.lc-link { 
  font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; 
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent);
}

/* ── FOOTER ── */
footer {
  margin-top: 40px; padding: 40px 24px;
  border-top: 1px solid var(--border);
  background: var(--surface); text-align: center;
}
.ft-inner { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 20px; }
.ft-logo img { height: 36px; width: auto; object-fit: contain; }
.ft-copy { font-size: 14px; color: var(--muted); }
.ft-links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
.ft-links a { font-size: 13.5px; color: var(--accent2); font-weight: 500; transition: color 0.2s; }
.ft-links a:hover { color: #fff; text-decoration: underline; }
.ft-links span { color: rgba(99,120,200,0.3); }

/* ── REVEAL ANIMATIONS ── */
.r { opacity: 0; transform: translateY(20px); transition: opacity 0.5s ease, transform 0.5s ease; }
.r.v { opacity: 1; transform: none; }

/* ── RESPONSIVE ── */
@media(max-width: 900px) {
  .h-inner { grid-template-columns: 1fr; text-align: center; gap: 48px; }
  .h-sub { margin: 0 auto 32px; }
  .h-tags, .h-btns { justify-content: center; }
  .h-right { order: -1; }
  .grid-2 { grid-template-columns: 1fr; }
  .sec-header-block { margin: 0 auto 32px; text-align: center; }
  .icon-wrap { width: 220px; height: 220px; }
}

@media(max-width: 640px) {
  nav { padding: 0 24px; }
  .n-links { display: none; }
  .hbg { display: flex; }
  .wrapper { padding: 60px 20px; }
  .section { padding: 24px 20px; }
  .legal-grid { grid-template-columns: 1fr; }
  .icon-wrap { width: 180px; height: 180px; }
  h1 { font-size: clamp(32px, 8vw, 42px); }
  .ft-inner { gap: 16px; }
}
</style>
</head>
